<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matching Game · Don't Lose the Customer!</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff0e8;
  --bg2:#ffe4d0;
  --card:#fff;
  --orange:#ff5500;
  --orange2:#ff8c00;
  --pink:#ff2d78;
  --pink2:#ff6ba8;
  --pink-pale:#ffe0ee;
  --yellow:#ffcc00;
  --green:#00b86b;
  --green-pale:#d4f7e8;
  --red:#ff2244;
  --red-pale:#ffe0e5;
  --text:#1a0505;
  --text2:#884422;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Lexend',sans-serif;color:var(--text);min-height:100vh;padding:1rem 1rem 3rem;
  background-image:radial-gradient(circle at 10% 20%,rgba(255,85,0,.1) 0%,transparent 50%),radial-gradient(circle at 90% 80%,rgba(255,45,120,.1) 0%,transparent 50%);}

.hdr{text-align:center;margin-bottom:1.3rem;}
.pill{display:inline-block;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-size:.65rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;padding:.3rem 1rem;border-radius:999px;margin-bottom:.6rem;box-shadow:0 4px 16px rgba(255,85,0,.35);}
h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{font-size:.85rem;color:var(--text2);margin-top:.25rem;}

.stats{display:flex;gap:.8rem;justify-content:center;margin-bottom:1rem;flex-wrap:wrap;}
.chip{background:#fff;border:2px solid var(--bg2);border-radius:999px;padding:.28rem .85rem;font-size:.8rem;font-weight:700;color:var(--text2);box-shadow:0 2px 8px rgba(255,85,0,.1);}

.instr{background:linear-gradient(135deg,rgba(255,85,0,.08),rgba(255,45,120,.08));border:2px solid var(--orange);border-radius:14px;padding:.65rem 1.1rem;margin-bottom:1.2rem;font-size:.83rem;color:var(--orange);font-weight:700;text-align:center;max-width:780px;margin-left:auto;margin-right:auto;}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;max-width:780px;margin:0 auto;}
@media(max-width:560px){.cols{grid-template-columns:1fr;}}

.col-ttl{font-size:.72rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);text-align:center;margin-bottom:.7rem;}

.card{
  padding:.75rem 1rem;border-radius:16px;border:2.5px solid var(--bg2);background:#fff;
  font-size:.88rem;font-weight:700;cursor:pointer;text-align:center;
  transition:all .18s;margin-bottom:.55rem;line-height:1.3;
  box-shadow:0 3px 12px rgba(255,85,0,.08);
}
.card:hover:not(.matched):not(.wrong){border-color:var(--orange);background:rgba(255,85,0,.06);transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,85,0,.15);}
.card.selected{border-color:var(--pink);background:var(--pink-pale);box-shadow:0 4px 18px rgba(255,45,120,.25);transform:translateY(-2px);}
.card.matched{border-color:var(--green);background:var(--green-pale);pointer-events:none;opacity:.75;}
.card.wrong{border-color:var(--red);background:var(--red-pale);animation:shake .28s ease;}

.win{display:none;text-align:center;padding:2rem 1.2rem;max-width:460px;margin:1.5rem auto 0;background:#fff;border-radius:24px;box-shadow:0 10px 40px rgba(255,85,0,.15);animation:wPop .45s cubic-bezier(.175,.885,.32,1.275) both;}
.win.show{display:block;}
@keyframes wPop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.wem{font-size:3.2rem;margin-bottom:.4rem;}
.wttl{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--orange),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.wsub{font-size:.88rem;color:var(--text2);margin:.25rem 0 1rem;}
.ragain{padding:.6rem 1.6rem;background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;border:none;border-radius:999px;font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px rgba(255,85,0,.35);transition:all .18s;}
.ragain:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,85,0,.45);}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(80px);color:#fff;padding:.6rem 1.4rem;border-radius:999px;font-weight:700;font-size:.9rem;transition:transform .3s cubic-bezier(.175,.885,.32,1.275);z-index:999;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{background:linear-gradient(135deg,var(--green),#00d980);box-shadow:0 4px 18px rgba(0,184,107,.4);}
.toast.err{background:linear-gradient(135deg,var(--red),#ff6680);box-shadow:0 4px 18px rgba(255,34,68,.4);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="hdr">
  <div class="pill">🌴 Unit 6 · Don't Lose the Customer!</div>
  <h1>🃏 Matching Game</h1>
  <p class="sub">Match each expression to its meaning!</p>
</div>
<div class="stats">
  <div class="chip">⏱ <span id="tmr">00:00</span></div>
  <div class="chip">✅ <span id="mc">0</span> / <span id="tc">0</span> pairs</div>
  <div class="chip">❌ <span id="ec">0</span> mistakes</div>
</div>
<div class="instr">👆 Click an expression on the LEFT, then click its matching meaning on the RIGHT.</div>
<div class="cols">
  <div><div class="col-ttl">🇬🇧 English Expression</div><div id="col-en"></div></div>
  <div><div class="col-ttl">💡 Meaning / Context</div><div id="col-fr"></div></div>
</div>
<div class="win" id="win">
  <div class="wem">🎊</div>
  <div class="wttl">Brilliant!</div>
  <div class="wsub" id="wsub"></div>
  <button class="ragain" onclick="reset()">🔄 Play Again</button>
</div>
<script>
const PAIRS=[
  {en:'Welcome to our shop!',fr:'Greeting a customer as they enter',id:1},
  {en:'How can I help you?',fr:'Offering assistance to a customer',id:2},
  {en:'What are you looking for?',fr:'Asking what a customer needs',id:3},
  {en:'I recommend this product.',fr:'Suggesting the best choice',id:4},
  {en:'It costs 25 euros.',fr:'Telling the customer the price',id:5},
  {en:'Thank you for visiting!',fr:'A polite way to say goodbye',id:6},
  {en:'Language barrier',fr:'When two people can\'t communicate',id:7},
  {en:'Lost customer',fr:'A customer who left without buying',id:8},
  {en:'Bad reputation',fr:'When a shop gets negative reviews',id:9},
  {en:'I\'m looking for a gift.',fr:'A tourist explaining what they want',id:10},
];
let matched=new Set(),selEn=null,selFr=null,mistakes=0,secs=0,tInt=null,activePairs=[];
function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function init(){
  matched=new Set();selEn=null;selFr=null;mistakes=0;secs=0;
  activePairs=shuffle(PAIRS).slice(0,8);
  document.getElementById('tc').textContent=activePairs.length;
  document.getElementById('mc').textContent=0;document.getElementById('ec').textContent=0;
  document.getElementById('win').classList.remove('show');
  const cEn=document.getElementById('col-en');cEn.innerHTML='';
  activePairs.forEach(p=>{const c=document.createElement('div');c.className='card';c.dataset.id=p.id;c.textContent=p.en;c.addEventListener('click',()=>pick(c,'en'));cEn.appendChild(c);});
  const cFr=document.getElementById('col-fr');cFr.innerHTML='';
  shuffle(activePairs).forEach(p=>{const c=document.createElement('div');c.className='card';c.dataset.id=p.id;c.textContent=p.fr;c.addEventListener('click',()=>pick(c,'fr'));cFr.appendChild(c);});
  clearInterval(tInt);secs=0;
  tInt=setInterval(()=>{secs++;const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');document.getElementById('tmr').textContent=`${m}:${s}`;},1000);
}
function pick(card,side){
  if(card.classList.contains('matched'))return;
  if(side==='en'){if(selEn)selEn.classList.remove('selected');if(selEn===card){selEn=null;return;}selEn=card;card.classList.add('selected');}
  else{if(selFr)selFr.classList.remove('selected');if(selFr===card){selFr=null;return;}selFr=card;card.classList.add('selected');}
  if(selEn&&selFr)check();
}
function check(){
  if(+selEn.dataset.id===+selFr.dataset.id){
    selEn.classList.remove('selected');selFr.classList.remove('selected');
    selEn.classList.add('matched');selFr.classList.add('matched');
    matched.add(+selEn.dataset.id);
    document.getElementById('mc').textContent=matched.size;
    toast('✅ Correct!','ok');selEn=null;selFr=null;
    if(matched.size===activePairs.length)setTimeout(showW,600);
  } else {
    mistakes++;document.getElementById('ec').textContent=mistakes;
    selEn.classList.add('wrong');selFr.classList.add('wrong');toast('❌ Try again!','err');
    setTimeout(()=>{selEn.classList.remove('selected','wrong');selFr.classList.remove('selected','wrong');selEn=null;selFr=null;},700);
  }
}
function showW(){
  clearInterval(tInt);
  const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');
  const stars=mistakes===0?'⭐⭐⭐':mistakes<=2?'⭐⭐':'⭐';
  document.getElementById('wsub').textContent=`${activePairs.length} pairs in ${m}:${s} · ${mistakes} mistake(s) · ${stars}`;
  document.getElementById('win').classList.add('show');
}
let tTO;
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(tTO);tTO=setTimeout(()=>t.classList.remove('show'),2000);}
function reset(){init();}
init();
</script>
</body>
</html>
